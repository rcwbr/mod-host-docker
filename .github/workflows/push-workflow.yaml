name: Push workflow
on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
jobs:
  devcontainer-cache-build:
    uses: rcwbr/devcontainer-cache-build/.github/workflows/devcontainer-cache-build.yaml@0.9.2
    permissions:
      packages: write
  # Overrides to include dive-efficiency info in release
  release-it-workflow:
    uses: rcwbr/release-it-gh-workflow/.github/workflows/release-it-workflow.yaml@0.5.2
    with:
      app-id: 4334939
      app-environment: Repo release
      release-it-config: .release-it.json
      release-it-image: ghcr.io/rcwbr/release-it-docker-file-bumper:0.8.1
      artifact-name: ${{ format('refs/heads/{0}', github.event.repository.default_branch) == github.ref && 'dive_results' || '' }}
    secrets:
      app-secret: ${{ secrets.RELEASE_IT_GITHUB_APP_KEY }}
    needs: dive-efficiency
  pre-commit:
    if: github.event_name == 'pull_request'
    uses: rcwbr/dockerfile-partials/.github/workflows/pre-commit.yaml@0.4.0
    needs: devcontainer-cache-build
    with:
      pre-commit-image: ${{ fromJSON(needs.devcontainer-cache-build.outputs.devcontainer-cache-image-all_configs).target.pre-commit.args.DEVCONTAINER_PRE_COMMIT_IMAGE }}
  pages:
    # Release pages on tags only
    if: github.ref_type == 'tag'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: devcontainer-cache-build
    container:
      image: ${{ needs.devcontainer-cache-build.outputs.devcontainer-cache-image-ref }}
      options: --user root
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          token: ${{ github.token }}
  build-docker-images:
    name: Build Docker images
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7
      - # TODO remove after more satisfactory options exist to use latest Docker
        # version while avoiding this issue: https://github.com/docker/buildx/issues/59
        name: Set up Docker
        uses: docker/setup-docker-action@v4
        with:
          version: 27.3.1
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }
      - name: GHCR Login
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker Buildx builder setup
        uses: docker/setup-buildx-action@v3.11.1
        with:
          version: v0.19.1
      - id: docker-bake-mod-host-docker
        name: Docker Bake mod-host-docker
        uses: docker/bake-action@v7.3.0
        with:
          source: https://github.com/rcwbr/dockerfile-partials.git#0.13.0
          files: github-cache-bake.hcl, cwd://docker-bake.hcl
          targets: mod-host-docker
        env:
          REGISTRY: ghcr.io/rcwbr/
          IMAGE_NAME: mod-host-docker
    outputs:
      mod-host-docker: ${{ steps.docker-bake-mod-host-docker.outputs.metadata }}
  dive-efficiency:
    name: Dive Docker image space efficiency analysis
    needs: build-docker-images
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
      - name: GHCR Login
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Dive JSON
        run: |
          docker run \
            --rm \
            -e CI=true \
            -v $(pwd)/.dive-ci:/etc/.dive-ci \
            -v $(pwd)/out:/out \
            -v /var/run/docker.sock:/var/run/docker.sock \
            wagoodman/dive:v0.13.1 \
            --ci-config /etc/.dive-ci \
            ${{ format(
              '{0}{1}',
              (github.ref_name == github.event.repository.default_branch && '--json /out/dive.json ' || ''),
              fromJSON(needs.build-docker-images.outputs.mod-host-docker).mod-host-docker['image.name']
            ) }}
      - name: Upload Dive result
        if: github.ref_name == github.event.repository.default_branch
        uses: actions/upload-artifact@v5.0.0
        with:
          name: dive_results
          path: out/dive.json
